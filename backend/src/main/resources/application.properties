spring.application.name=ecommerce
spring.config.import=optional:classpath:application-secret.properties

# Datasource Configuration (Moved to application-secret.properties)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# Cookie Configuration
app.cookie.secure=false

# Phone Number Encryption
# Actual key is in application-secret.properties (Base64-encoded 32-byte AES-256 key)
app.encryption.phone-secret-key=${APP_PHONE_ENCRYPTION_KEY:}
